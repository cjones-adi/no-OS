%YAML 1.2
---
$id: http://devicetree.org/schemas/hwmon/adi,ltc2991.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Analog Devices LTC2991 Voltage/Current/Temperature Monitor

maintainers:
  - Your Name <your.email@example.com>

$ref: /schemas/i2c/i2c-device.yaml#

properties:
  compatible:
    const: adi,ltc2991

  reg:
    maxItems: 1

  vcc-supply:
    description: Main power supply

required:
  - compatible
  - reg
  - vcc-supply

additionalProperties: false

examples:
  - |
    i2c {
        #address-cells = <1>;
        #size-cells = <0>;

        monitor@48 {
            compatible = "adi,ltc2991";
            reg = <0x48>;
            vcc-supply = <&vcc>;
        };
    };
