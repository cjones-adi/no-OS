name: Update Review Patterns

on:
  # Run weekly on Monday at 9 AM UTC
  schedule:
    - cron: '0 9 * * 1'

  # Allow manual triggering
  workflow_dispatch:
    inputs:
      force_full:
        description: 'Force full re-analysis'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-patterns:
    runs-on: ubuntu-latest
    if: github.repository == 'analogdevicesinc/no-OS'

    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install GitHub CLI
        run: |
          sudo apt-get update
          sudo apt-get install gh

      - name: Configure GitHub CLI
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token

      - name: Update review patterns
        run: |
          cd tools/pre-commit
          if [[ "${{ github.event.inputs.force_full }}" == "true" ]]; then
            python3 auto-update-patterns.py --full
          else
            python3 auto-update-patterns.py
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet review_patterns_6month.json; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add review_patterns_6month.json .review_patterns_state.json
          git commit -m "auto: update review patterns with latest PR comments

          - Weekly automated update
          - Maintains rolling 6-month window
          - Updates category counts and examples

          Co-Authored-By: GitHub Actions <noreply@github.com>"
          git push

      - name: Update documentation
        if: steps.changes.outputs.changes == 'true'
        run: |
          # Update last updated date in memory files
          current_date=$(date +"%Y-%m-%d")
          sed -i "s/Last Updated:.*/Last Updated: $current_date (Automated review pattern update)/" /home/cj/.claude/projects/-home-cj-no-OS/memory/MEMORY.md || true

      - name: Summary
        run: |
          if [[ "${{ steps.changes.outputs.changes }}" == "true" ]]; then
            echo "✅ Review patterns updated successfully"
            python3 -c "
            import json
            with open('review_patterns_6month.json') as f:
              data = json.load(f)
            print(f\"📊 Total PRs: {data['analysis_scope']['total_prs']}\")
            print(f\"💬 Total comments: {data['analysis_scope']['total_comments']}\")
            print('📋 Top categories:')
            for cat, count in sorted(data['category_counts'].items(), key=lambda x: x[1], reverse=True)[:5]:
              percentage = count / data['analysis_scope']['total_comments'] * 100
              print(f\"  {cat}: {count} ({percentage:.1f}%)\")
            "
          else
            echo "ℹ️ No new PRs to analyze"
          fi